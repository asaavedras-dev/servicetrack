name: Publish and deploy ServiceTrack

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository_owner }}/servicetrack-api
  WEB_IMAGE_NAME: ${{ github.repository_owner }}/servicetrack-web

concurrency:
  group: servicetrack-production
  cancel-in-progress: false

jobs:
  publish-api:
    name: Publish API image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar etiquetas de la API
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Construir y publicar API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/ServiceTrack.Api/Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          cache-from: type=gha,scope=servicetrack-api
          cache-to: type=gha,mode=max,scope=servicetrack-api

  publish-web:
    name: Publish Web image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar etiquetas del frontend
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Construir y publicar frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/servicetrack-web
          file: ./frontend/servicetrack-web/Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=servicetrack-web
          cache-to: type=gha,mode=max,scope=servicetrack-web

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest

    needs:
      - publish-api
      - publish-web

    environment: production
    timeout-minutes: 15

    steps:
      - name: Preparar conexión SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh

          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan \
            -p "$VPS_PORT" \
            -H "$VPS_HOST" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      - name: Desplegar ServiceTrack en la VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "bash -s" <<'REMOTE_SCRIPT'
              set -euo pipefail

              APP_DIR="/opt/services/servicetrack"

              echo "Entrando a $APP_DIR"
              cd "$APP_DIR"

              echo "Descargando imágenes nuevas"
              docker compose pull

              echo "Actualizando contenedores"
              docker compose up \
                --detach \
                --remove-orphans

              echo "Esperando servicios saludables"

              for attempt in $(seq 1 18); do
                API_HEALTH="$(docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                  servicetrack-api 2>/dev/null || true)"

                WEB_HEALTH="$(docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                  servicetrack-web 2>/dev/null || true)"

                echo "Intento $attempt/18: API=$API_HEALTH WEB=$WEB_HEALTH"

                if [ "$API_HEALTH" = "healthy" ] && \
                   [ "$WEB_HEALTH" = "healthy" ]; then
                  echo "Ambos contenedores están saludables"
                  break
                fi

                if [ "$attempt" -eq 18 ]; then
                  echo "ERROR: los servicios no alcanzaron estado healthy"
                  docker compose ps
                  docker compose logs --tail 150
                  exit 1
                fi

                sleep 5
              done

              echo "Validando frontend desde la red Docker"

              docker run --rm \
                --network web \
                curlimages/curl:latest \
                --fail \
                --silent \
                --show-error \
                http://servicetrack-web/health \
                > /dev/null

              echo "Validando API mediante el proxy del frontend"

              docker run --rm \
                --network web \
                curlimages/curl:latest \
                --fail \
                --silent \
                --show-error \
                http://servicetrack-web/api/health \
                > /dev/null

              echo "Estado final"
              docker compose ps
          REMOTE_SCRIPT

      - name: Validar URL pública del frontend
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 6 \
            --retry-delay 5 \
            https://servicetrack.asaavedras.com/health

      - name: Validar URL pública de la API
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 6 \
            --retry-delay 5 \
            https://servicetrack.asaavedras.com/api/health

      - name: Crear resumen del despliegue
        shell: bash
        run: |
          {
            echo "## ServiceTrack desplegado"
            echo ""
            echo "- Ambiente: production"
            echo "- Commit: ${{ github.sha }}"
            echo "- API: ghcr.io/${{ env.API_IMAGE_NAME }}:latest"
            echo "- Web: ghcr.io/${{ env.WEB_IMAGE_NAME }}:latest"
            echo "- URL: https://servicetrack.asaavedras.com"
          } >> "$GITHUB_STEP_SUMMARY"