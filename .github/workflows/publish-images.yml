name: Publish container images

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository_owner }}/servicetrack-api
  WEB_IMAGE_NAME: ${{ github.repository_owner }}/servicetrack-web

concurrency:
  group: publish-servicetrack-images
  cancel-in-progress: false

jobs:
  publish-api:
    name: Publish API image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar etiquetas de la API
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Construir y publicar API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/ServiceTrack.Api/Dockerfile
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          cache-from: type=gha,scope=servicetrack-api
          cache-to: type=gha,mode=max,scope=servicetrack-api

  publish-web:
    name: Publish Web image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar etiquetas del frontend
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Construir y publicar frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/servicetrack-web
          file: ./frontend/servicetrack-web/Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=servicetrack-web
          cache-to: type=gha,mode=max,scope=servicetrack-web